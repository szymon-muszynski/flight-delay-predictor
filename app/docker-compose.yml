services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

  trainer:
    image: apache/spark:3.5.0
    user: root
    volumes:
      - ./trainer:/app
      - ./model:/app/model
    working_dir: /app
    command: >
      bash -c "pip install --no-cache-dir pyspark numpy pandas scikit-learn kagglehub &&
              python3 train.py"

  spark-ml:
    image: apache/spark:3.5.0
    user: root
    volumes:
      - ./spark_ml_service:/app
      - ./model:/app/model
    working_dir: /app
    command: >
      bash -c "pip install --no-cache-dir pyspark numpy pandas scikit-learn kafka-python &&
              python3 service.py"
    depends_on:
      - kafka

  api:
    image: python:3.11
    volumes:
      - ./backend:/app
      - ./model:/app/model
    working_dir: /app
    command: >
      bash -c "pip install kafka-python fastapi uvicorn &&
              uvicorn main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      - kafka
      
  frontend:
      build: ./frontend
      ports:
        - "3000:3000"
      volumes:
        - ./frontend:/app
        - /app/node_modules  # To jest ważne, żeby Docker nie nadpisał bibliotek
      environment:
        - WDS_SOCKET_PORT=0
      depends_on:
        - api